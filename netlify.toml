[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API redirects - doivent être AVANT le catch-all
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all - en DERNIER
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
